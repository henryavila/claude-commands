name: Publish to npm

on:
  release:
    types: [published]

# OIDC Trusted Publishing — no npm token needed
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC requires npm >= 11.5.1; Node 22 bundled npm may be older
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test

      # No NODE_AUTH_TOKEN — OIDC handles auth via id-token
      - run: npm publish --provenance --access public
